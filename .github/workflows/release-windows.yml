name: Release Windows

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync app version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+([+-][0-9A-Za-z.-]+)?$') {
            throw "Tag '${{ github.ref_name }}' must be a semver tag like v1.2.3"
          }

          npm version $version --no-git-tag-version --allow-same-version

          $tauriConfig = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauriConfig.version = $version
          $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content src-tauri/tauri.conf.json -Encoding utf8

          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw
          $cargoToml = $cargoToml -replace '(?m)^version = ".*"', "version = `"$version`""
          Set-Content src-tauri/Cargo.toml $cargoToml -Encoding utf8

      - name: Build and publish Windows bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Lumen ${{ github.ref_name }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          tauriScript: npm run tauri
