name: Release Windows

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync app version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+([+-][0-9A-Za-z.-]+)?$') {
            throw "Tag '${{ github.ref_name }}' must be a semver tag like v1.2.3"
          }

          npm version $version --no-git-tag-version --allow-same-version

          $tauriConfig = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauriConfig.version = $version
          $tauriConfig | ConvertTo-Json -Depth 100 | Set-Content src-tauri/tauri.conf.json -Encoding utf8

          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw
          $cargoToml = $cargoToml -replace '(?m)^version = ".*"', "version = `"$version`""
          Set-Content src-tauri/Cargo.toml $cargoToml -Encoding utf8

      - name: Build Windows bundles
        run: npm run tauri:build

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @(
            Get-ChildItem src-tauri/target/release/bundle/nsis -Filter *.exe -File -ErrorAction SilentlyContinue
            Get-ChildItem src-tauri/target/release/bundle/msi -Filter *.msi -File -ErrorAction SilentlyContinue
          ) | ForEach-Object { $_.FullName }

          if (-not $assets) {
            throw "No Windows bundle assets were found."
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --title "Lumen $tag" --generate-notes --verify-tag --latest
          }

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
