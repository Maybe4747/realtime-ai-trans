<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LUMEN 字幕</title>
<style>
  :root{
    --subtitle-en-size:19px;
    --subtitle-zh-size:30px;
    --subtitle-en-color:#1d1d1f;
    --subtitle-zh-color:#111113;
    --subtitle-bg-soft:rgba(255,255,255,.76);
    --subtitle-bg-strong:rgba(255,255,255,.92);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:transparent;overflow:hidden;user-select:none}
  body{display:flex;align-items:flex-end;justify-content:center;padding:0 24px 34px}

  .bar{
    max-width:min(92vw,1080px);text-align:center;position:relative;padding:0;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    opacity:0;transform:translateY(8px);transition:opacity .16s ease,transform .16s ease;
    pointer-events:none;
  }
  .bar.visible{opacity:1;transform:translateY(0)}

  .en{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
    font-size:var(--subtitle-en-size);line-height:1.65;color:var(--subtitle-en-color);
    letter-spacing:0;text-shadow:none;
  }
  .en.partial{color:#2f3033}

  .zh{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    font-weight:520;font-size:var(--subtitle-zh-size);line-height:1.55;color:var(--subtitle-zh-color);
    letter-spacing:0;text-shadow:none;
  }
  .text-bg{
    display:inline;padding:.12em .38em;border-radius:.36em;
    background:var(--subtitle-bg-strong);
    -webkit-box-decoration-break:clone;box-decoration-break:clone;
  }
  .en .text-bg{background:var(--subtitle-bg-soft)}
  .zh .text-bg{background:var(--subtitle-bg-strong)}
  .term{color:inherit;font-weight:620}
  .err .text-bg{
    background:rgba(255,255,255,.92);color:#b42318;
  }
</style>
</head>
<body>
  <div class="bar" id="bar">
    <div class="en" id="en"></div>
    <div class="zh" id="zh"></div>
  </div>

<script>
  const barEl = document.getElementById("bar");
  const enEl = document.getElementById("en");
  const zhEl = document.getElementById("zh");
  let minDwellMs = 1800;
  let maxDwellMs = 4200;
  const CHAR_DWELL_MS = 80;
  const ORDER_GRACE_MS = 250;
  let maxQueue = 5;
  let subtitleMode = "bilingual";

  const records = new Map();
  const displayQueue = [];
  let currentId = null;
  let currentMode = "idle";
  let currentUntil = 0;
  let lastDisplayedDoneId = -1;
  let timer = null;

  // 把中文里的英文术语(连续 ASCII 词)高亮为金色,无需术语表(design §5.4 L1)
  function hl(text) {
    const esc = (text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    return esc.replace(/[A-Za-z][A-Za-z0-9.+#_-]*/g, (m) => `<span class="term">${m}</span>`);
  }

  function lineHtml(text) {
    const content = (text || "").trim();
    return content ? `<span class="text-bg">${hl(content)}</span>` : "";
  }

  function updateVisibility() {
    const enVisible = enEl.style.display !== "none" && enEl.textContent.trim();
    const zhVisible = zhEl.style.display !== "none" && zhEl.textContent.trim();
    barEl.classList.toggle("visible", Boolean(enVisible || zhVisible));
  }

  function hideOverlay() {
    currentId = null;
    currentMode = "idle";
    enEl.innerHTML = "";
    zhEl.innerHTML = "";
    barEl.classList.remove("visible");
  }

  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function dwellMs(text) {
    let ms = clamp(1400 + Array.from(text || "").length * CHAR_DWELL_MS, minDwellMs, maxDwellMs);
    if (displayQueue.length >= 3) ms = Math.min(ms, 1600);
    if (displayQueue.length >= maxQueue) ms = Math.min(ms, 1000);
    return ms;
  }

  function renderRecord(record) {
    const { id, original, translated, status } = record;
    currentId = id;
    enEl.style.display = subtitleMode === "zh_only" ? "none" : "";
    zhEl.style.display = subtitleMode === "en_only" ? "none" : "";

    const enPartial = status === "asr_partial";
    enEl.className = enPartial ? "en partial" : "en";
    enEl.innerHTML = lineHtml(original);

    if (status === "done") {
      currentMode = "done";
      lastDisplayedDoneId = Math.max(lastDisplayedDoneId, id);
      zhEl.innerHTML = lineHtml(translated);
      currentUntil = Date.now() + dwellMs(translated || original);
      schedule(currentUntil - Date.now());
    } else {
      currentMode = "live";
      currentUntil = 0;
      if (status === "translating") {
        zhEl.innerHTML = lineHtml(translated);
      } else {
        zhEl.innerHTML = "";
      }
    }
    updateVisibility();
  }

  function latestLiveRecord() {
    let latest = null;
    for (const record of records.values()) {
      if (record.id <= lastDisplayedDoneId || record.status === "done") continue;
      if (!latest || record.id > latest.id) latest = record;
    }
    return latest;
  }

  function enqueueDone(id) {
    if (id <= lastDisplayedDoneId || displayQueue.includes(id)) return;
    displayQueue.push(id);
    displayQueue.sort((a, b) => a - b);
    while (displayQueue.length > maxQueue) displayQueue.shift();
  }

  function onSubtitleConfig(p) {
    subtitleMode = p.subtitleMode || subtitleMode;
    minDwellMs = Number(p.minDwellMs) || minDwellMs;
    maxDwellMs = Number(p.maxDwellMs) || maxDwellMs;
    maxQueue = Number(p.maxQueue) || maxQueue;
    applySubtitleStyle(p);
    const current = records.get(currentId);
    if (current) {
      renderRecord(current);
    } else {
      updateVisibility();
    }
  }

  function applySubtitleStyle(p) {
    const root = document.documentElement.style;
    const size = clamp(Number(p.subtitleFontSize) || 30, 18, 64);
    root.setProperty("--subtitle-zh-size", `${size}px`);
    root.setProperty("--subtitle-en-size", `${Math.max(13, Math.round(size * 0.63))}px`);
    if (isHexColor(p.subtitleOriginalColor)) {
      root.setProperty("--subtitle-en-color", p.subtitleOriginalColor);
    }
    if (isHexColor(p.subtitleTranslatedColor)) {
      root.setProperty("--subtitle-zh-color", p.subtitleTranslatedColor);
    }
    if (isHexColor(p.subtitleBackgroundColor)) {
      const opacity = clamp(Number(p.subtitleBackgroundOpacity), 0, 100) / 100;
      root.setProperty("--subtitle-bg-strong", hexToRgba(p.subtitleBackgroundColor, opacity));
      root.setProperty("--subtitle-bg-soft", hexToRgba(p.subtitleBackgroundColor, opacity * 0.82));
    }
  }

  function isHexColor(value) {
    return /^#[0-9a-fA-F]{6}$/.test(value || "");
  }

  function hexToRgba(hex, opacity) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${opacity})`;
  }

  function schedule(delay) {
    if (timer) clearTimeout(timer);
    timer = setTimeout(playNext, Math.max(0, delay));
  }

  function playNext() {
    timer = null;
    if (currentMode === "done" && Date.now() < currentUntil) {
      schedule(currentUntil - Date.now());
      return;
    }

    while (displayQueue.length) {
      const id = displayQueue.shift();
      const record = records.get(id);
      if (!record || record.status !== "done" || id <= lastDisplayedDoneId) continue;
      renderRecord(record);
      return;
    }

    const live = latestLiveRecord();
    if (live) {
      renderRecord(live);
      return;
    }

    currentId = null;
    hideOverlay();
  }

  function onSubtitle(p) {
    const { id, original, translated, status } = p;
    if (status === "error") {
      hideOverlay();
      return;
    }

    const prev = records.get(id) || {};
    if (prev.status === "done" && status !== "done") return;

    const record = {
      id,
      original: original || prev.original || "",
      translated: translated || prev.translated || "",
      status,
    };
    records.set(id, record);

    if (status === "done") {
      enqueueDone(id);
      schedule(currentMode === "done" ? currentUntil - Date.now() : ORDER_GRACE_MS);
      return;
    }

    if (currentMode === "done" && Date.now() < currentUntil && currentId !== id) {
      return;
    }

    if (currentId === id || currentMode !== "done") {
      renderRecord(record);
    }
  }

  function bind() {
    if (window.__TAURI__ && window.__TAURI__.event) {
      window.__TAURI__.event.listen("subtitle", (e) => onSubtitle(e.payload));
      window.__TAURI__.event.listen("subtitle_config", (e) => onSubtitleConfig(e.payload));
    } else {
      setTimeout(bind, 80);
    }
  }
  bind();
</script>
</body>
</html>
