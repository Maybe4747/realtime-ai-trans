<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LUMEN 字幕</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:transparent;overflow:hidden;user-select:none}
  body{display:flex;align-items:flex-end;justify-content:center;padding-bottom:18px}

  .bar{max-width:92vw;text-align:center;position:relative;padding:14px 30px;}
  .bar::before{
    content:"";position:absolute;inset:-30px -60px;z-index:-1;
    background:radial-gradient(60% 130% at 50% 60%, rgba(6,5,4,.74), transparent 75%);
    filter:blur(6px);
  }

  /* 英文(上行,小,暗,机器转录感) */
  .en{
    font-family:"Spline Sans Mono",monospace;font-size:1.04rem;
    color:#a59b89;letter-spacing:.01em;margin-bottom:10px;min-height:1.4em;
    text-shadow:0 2px 16px rgba(0,0,0,.8);
  }
  .en.partial{color:#8f857a}
  .en .term{color:#e6b56a}
  .caret{display:inline-block;width:.46em;height:1em;vertical-align:-.12em;margin-left:.04em;
    background:#f1c87b;border-radius:1px;animation:blink .9s steps(1) infinite;box-shadow:0 0 8px #f1c87b}
  @keyframes blink{50%{opacity:0}}

  /* 中文(下行,大,亮,译文是主角) */
  .zh{
    font-family:"Noto Serif SC",serif;font-weight:400;
    font-size:clamp(1.7rem,3.2vw,2.5rem);line-height:1.3;color:#f5eee1;
    letter-spacing:.02em;min-height:1.4em;
    text-shadow:0 2px 30px rgba(0,0,0,.9),0 0 50px rgba(0,0,0,.5);
  }
  .zh .term{color:#f1c87b;font-family:"Spline Sans Mono",monospace;font-size:.86em;font-weight:500}
  .zh .dots{color:#e6b56a;animation:blink 1s steps(1) infinite}
  .err{color:#d98a7a;font-size:.9rem;font-family:"Spline Sans Mono",monospace}

  .idle{font-family:"Spline Sans Mono",monospace;font-size:.8rem;letter-spacing:.22em;
    color:rgba(165,155,137,.4);display:flex;align-items:center;gap:9px;justify-content:center}
  .idle::before{content:"";width:7px;height:7px;border-radius:50%;
    background:#e6b56a;box-shadow:0 0 12px #e6b56a;animation:blink 2s infinite}
</style>
</head>
<body>
  <div class="bar">
    <div class="en" id="en"></div>
    <div class="zh" id="zh"><span class="idle">LUMEN · 聆听系统声音…</span></div>
  </div>

<script>
  const enEl = document.getElementById("en");
  const zhEl = document.getElementById("zh");
  let minDwellMs = 1800;
  let maxDwellMs = 4200;
  const CHAR_DWELL_MS = 80;
  const ORDER_GRACE_MS = 250;
  let maxQueue = 5;
  let subtitleMode = "bilingual";

  const records = new Map();
  const displayQueue = [];
  let currentId = null;
  let currentMode = "idle";
  let currentUntil = 0;
  let lastDisplayedDoneId = -1;
  let timer = null;

  // 把中文里的英文术语(连续 ASCII 词)高亮为金色,无需术语表(design §5.4 L1)
  function hl(text) {
    const esc = (text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    return esc.replace(/[A-Za-z][A-Za-z0-9.+#_-]*/g, (m) => `<span class="term">${m}</span>`);
  }

  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function dwellMs(text) {
    let ms = clamp(1400 + Array.from(text || "").length * CHAR_DWELL_MS, minDwellMs, maxDwellMs);
    if (displayQueue.length >= 3) ms = Math.min(ms, 1600);
    if (displayQueue.length >= maxQueue) ms = Math.min(ms, 1000);
    return ms;
  }

  function renderRecord(record) {
    const { id, original, translated, status } = record;
    currentId = id;
    enEl.style.display = subtitleMode === "zh_only" ? "none" : "";
    zhEl.style.display = subtitleMode === "en_only" ? "none" : "";

    const enPartial = status === "asr_partial";
    enEl.className = enPartial ? "en partial" : "en";
    enEl.innerHTML = hl(original) + (enPartial ? '<span class="caret"></span>' : "");

    if (status === "done") {
      currentMode = "done";
      lastDisplayedDoneId = Math.max(lastDisplayedDoneId, id);
      zhEl.innerHTML = hl(translated);
      currentUntil = Date.now() + dwellMs(translated);
      schedule(currentUntil - Date.now());
    } else {
      currentMode = "live";
      currentUntil = 0;
      if (status === "translating") {
        zhEl.innerHTML = hl(translated) + '<span class="dots">▋</span>';
      } else if (status === "asr_final") {
        zhEl.innerHTML = '<span class="dots">翻译中…</span>';
      } else {
        zhEl.innerHTML = "";
      }
    }
  }

  function latestLiveRecord() {
    let latest = null;
    for (const record of records.values()) {
      if (record.id <= lastDisplayedDoneId || record.status === "done") continue;
      if (!latest || record.id > latest.id) latest = record;
    }
    return latest;
  }

  function enqueueDone(id) {
    if (id <= lastDisplayedDoneId || displayQueue.includes(id)) return;
    displayQueue.push(id);
    displayQueue.sort((a, b) => a - b);
    while (displayQueue.length > maxQueue) displayQueue.shift();
  }

  function onSubtitleConfig(p) {
    subtitleMode = p.subtitleMode || subtitleMode;
    minDwellMs = Number(p.minDwellMs) || minDwellMs;
    maxDwellMs = Number(p.maxDwellMs) || maxDwellMs;
    maxQueue = Number(p.maxQueue) || maxQueue;
  }

  function schedule(delay) {
    if (timer) clearTimeout(timer);
    timer = setTimeout(playNext, Math.max(0, delay));
  }

  function playNext() {
    timer = null;
    if (currentMode === "done" && Date.now() < currentUntil) {
      schedule(currentUntil - Date.now());
      return;
    }

    while (displayQueue.length) {
      const id = displayQueue.shift();
      const record = records.get(id);
      if (!record || record.status !== "done" || id <= lastDisplayedDoneId) continue;
      renderRecord(record);
      return;
    }

    const live = latestLiveRecord();
    if (live) {
      renderRecord(live);
      return;
    }

    currentId = null;
    currentMode = "idle";
  }

  function onSubtitle(p) {
    const { id, original, translated, status } = p;
    if (status === "error") {
      enEl.innerHTML = "";
      zhEl.innerHTML = `<span class="err">${original} ${translated}</span>`;
      return;
    }

    const prev = records.get(id) || {};
    if (prev.status === "done" && status !== "done") return;

    const record = {
      id,
      original: original || prev.original || "",
      translated: translated || prev.translated || "",
      status,
    };
    records.set(id, record);

    if (status === "done") {
      enqueueDone(id);
      schedule(currentMode === "done" ? currentUntil - Date.now() : ORDER_GRACE_MS);
      return;
    }

    if (currentMode === "done" && Date.now() < currentUntil && currentId !== id) {
      return;
    }

    if (currentId === id || currentMode !== "done") {
      renderRecord(record);
    }
  }

  function bind() {
    if (window.__TAURI__ && window.__TAURI__.event) {
      window.__TAURI__.event.listen("subtitle", (e) => onSubtitle(e.payload));
      window.__TAURI__.event.listen("subtitle_config", (e) => onSubtitleConfig(e.payload));
    } else {
      setTimeout(bind, 80);
    }
  }
  bind();
</script>
</body>
</html>
